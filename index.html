  <style>
    /* ---------------------------------------------------------------
     TOKENS
  --------------------------------------------------------------- */
    @property --sky-top {
      syntax: '<color>';
      inherits: true;
      initial-value: #0B1330;
    }

    @property --sky-mid {
      syntax: '<color>';
      inherits: true;
      initial-value: #16204A;
    }

    @property --sky-bottom {
      syntax: '<color>';
      inherits: true;
      initial-value: #283969;
    }

    :root {
      --text-primary: #F7F5F0;
      --text-secondary: rgba(247, 245, 240, 0.72);
      --text-tertiary: rgba(247, 245, 240, 0.46);
      --accent: #FFB454;
      --accent-soft: rgba(255, 180, 84, 0.18);
      --accent-cool: #8FB8FF;
      --danger: #FF8A7A;
      --glass-bg: rgba(13, 16, 26, 0.40);
      --glass-bg-strong: rgba(9, 11, 18, 0.58);
      --glass-border: rgba(255, 255, 255, 0.13);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --font-display: 'Fraunces', 'Iowan Old Style', Georgia, serif;
      --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
      --ease: cubic-bezier(.22, .61, .36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #0B1330;
      font-family: var(--font-body);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      font-family: inherit;
    }

    ::selection {
      background: var(--accent-soft);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 8px;
    }

    :focus:not(:focus-visible) {
      outline: none;
    }

    /* ---------------------------------------------------------------
     LIVING SKY  (full-bleed, fixed, behind everything)
  --------------------------------------------------------------- */
    #skyLayer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #0B1330;
    }

    #skyGradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bottom) 100%);
      transition: --sky-top 1.4s var(--ease), --sky-mid 1.4s var(--ease), --sky-bottom 1.4s var(--ease);
    }

    #horizonGlow {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 55%;
      background: radial-gradient(60% 60% at 50% 100%, rgba(255, 158, 98, 0.55), rgba(255, 158, 98, 0) 70%);
      opacity: 0;
      transition: opacity .6s var(--ease);
      mix-blend-mode: screen;
    }

    #stars {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s var(--ease);
    }

    #stars span {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      background: transparent;
      border-radius: 50%;
    }

    #celestialBody {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: left 2.2s var(--ease), top 2.2s var(--ease), opacity 1.4s var(--ease), background 1s ease;
      pointer-events: none;
    }

    #celestialBody.sun {
      background: radial-gradient(circle, #FFE6B0 0%, #FFB454 55%, rgba(255, 180, 84, 0) 100%);
      box-shadow: 0 0 56px 13px rgba(255, 180, 84, 0.40);
    }

    #celestialBody.moon {
      background: radial-gradient(circle, #F4F2FF 0%, #C9D6F2 60%, rgba(201, 214, 242, 0) 100%);
      box-shadow: 0 0 38px 9px rgba(180, 200, 255, 0.28);
    }

    #cloudsLayer {
      position: absolute;
      inset: 0;
    }

    .cloud {
      position: absolute;
      width: 170px;
      height: 62px;
      border-radius: 50%;
      filter: blur(7px);
      opacity: .85;
      will-change: transform;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud::before {
      width: 62%;
      height: 95%;
      top: -42%;
      left: 8%;
    }

    .cloud::after {
      width: 48%;
      height: 75%;
      top: -26%;
      right: 6%;
    }

    .cloud--light {
      background: radial-gradient(closest-side, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0));
    }

    .cloud--grey {
      background: radial-gradient(closest-side, rgba(214, 219, 226, 0.85), rgba(214, 219, 226, 0));
    }

    .cloud--dark {
      background: radial-gradient(closest-side, rgba(58, 66, 80, 0.85), rgba(58, 66, 80, 0));
    }

    .cloud--night {
      background: radial-gradient(closest-side, rgba(120, 131, 158, 0.55), rgba(120, 131, 158, 0));
    }

    @keyframes drift {
      from {
        transform: translateX(-22vw);
      }

      to {
        transform: translateX(122vw);
      }
    }

    .precip {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .9s var(--ease);
      overflow: hidden;
    }

    .precip.active {
      opacity: 1;
    }

    .raindrop {
      position: absolute;
      top: -14vh;
      left: 0;
      border-radius: 3px;
      background: linear-gradient(180deg,
          rgba(214, 231, 255, 0) 0%,
          rgba(214, 231, 255, 0.55) 55%,
          rgba(230, 241, 255, 0.92) 100%);
      animation-name: dropFall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      will-change: transform;
    }

    @keyframes dropFall {
      from {
        transform: translate(0, 0) rotate(var(--rot, 9deg));
      }

      to {
        transform: translate(var(--drift, 5vw), 130vh) rotate(var(--rot, 9deg));
      }
    }

    .splash {
      position: absolute;
      bottom: 0;
      width: 6px;
      height: 2px;
      border-radius: 50%;
      border: 1px solid rgba(225, 238, 255, 0.55);
      animation-name: splashRing;
      animation-timing-function: ease-out;
      animation-iteration-count: infinite;
    }

    @keyframes splashRing {
      0% {
        transform: scale(0.3);
        opacity: .7;
      }

      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    #snowLayer {
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.95) 1.4px, transparent 1.8px),
        radial-gradient(circle, rgba(255, 255, 255, 0.75) 1px, transparent 1.4px);
      background-size: 70px 70px, 130px 130px;
      background-position: 0 0, 40px 10px;
      animation: snowFall 9s linear infinite;
    }

    @keyframes snowFall {
      from {
        background-position: 0 0, 40px 10px;
      }

      to {
        background-position: 36px 700px, 4px 760px;
      }
    }

    #fogLayer {
      background:
        linear-gradient(180deg, rgba(225, 230, 236, 0) 0%, rgba(225, 230, 236, 0.30) 40%, rgba(225, 230, 236, 0.42) 60%, rgba(225, 230, 236, 0.10) 100%);
      backdrop-filter: blur(1px);
    }

    #fogLayer span {
      position: absolute;
      left: -30%;
      width: 160%;
      height: 60px;
      border-radius: 50%;
      background: rgba(235, 238, 242, 0.30);
      filter: blur(14px);
      animation: fogDrift 26s linear infinite;
    }

    @keyframes fogDrift {
      from {
        transform: translateX(-10%);
      }

      to {
        transform: translateX(10%);
      }
    }

    #lightningFlash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    #lightningFlash.flash {
      animation: flash var(--flash-dur, .55s) ease-out;
    }

    @keyframes flash {
      0% {
        opacity: 0;
      }

      6% {
        opacity: var(--flash-peak, .85);
      }

      12% {
        opacity: .05;
      }

      18% {
        opacity: calc(var(--flash-peak, .85) * 0.6);
      }

      30% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    /* The bolt sits above the flash (later in DOM = painted on top) so its jagged channel
     reads as a distinct bright shape even while the ambient flash is near-opaque white
     behind it -- exactly how an overexposed lightning photo looks. */
    #lightningBolt {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    #lightningBolt svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #lightningBolt .bolt-core {
      fill: none;
      stroke: #F4F8FF;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 3px rgba(221, 233, 255, 0.95)) drop-shadow(0 0 9px rgba(163, 199, 255, 0.75)) drop-shadow(0 0 22px rgba(120, 170, 255, 0.5));
    }

    #lightningBolt .bolt-branch {
      fill: none;
      stroke: #DCE6FF;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .5;
      filter: drop-shadow(0 0 5px rgba(151, 188, 255, 0.6));
    }

    #lightningBolt.flash {
      animation: boltFlicker var(--flash-dur, .55s) ease-out;
    }

    @keyframes boltFlicker {
      0% {
        opacity: 0;
      }

      4% {
        opacity: 1;
      }

      9% {
        opacity: .08;
      }

      16% {
        opacity: .9;
      }

      24% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 80% at 50% 20%, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.32) 100%);
      pointer-events: none;
    }

    /* ---------------------------------------------------------------
     APP SHELL
  --------------------------------------------------------------- */
    .app {
      position: relative;
      z-index: 1;
      max-width: 580px;
      margin: 0 auto;
      padding: 22px 20px 56px;
      min-height: 100vh;
    }

    .topbar {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      opacity: 0;
      transform: translateY(-10px);
      animation: riseIn .6s var(--ease) .05s forwards;
    }

    .search {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 11px 14px;
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
    }

    .search svg {
      flex-shrink: 0;
      color: var(--text-tertiary);
      width: 18px;
      height: 18px;
    }

    .search input {
      flex: 1;
      min-width: 0;
      background: none;
      border: none;
      outline: none;
      font: 600 15px/1.3 var(--font-body);
      color: var(--text-primary);
    }

    .search input::placeholder {
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--glass-bg-strong);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      overflow: hidden;
      z-index: 5;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    .suggestions button {
      display: flex;
      flex-direction: column;
      gap: 1px;
      width: 100%;
      text-align: left;
      padding: 11px 14px;
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-body);
    }

    .suggestions button+button {
      border-top: 1px solid var(--glass-border);
    }

    .suggestions button:hover,
    .suggestions button:focus-visible {
      background: rgba(255, 255, 255, 0.07);
    }

    .suggestions .s-name {
      font-weight: 700;
      font-size: 14.5px;
    }

    .suggestions .s-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }

    .suggestions .s-empty {
      padding: 13px 14px;
      font-size: 13.5px;
      color: var(--text-secondary);
    }

    .icon-btn {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: background .2s ease, transform .2s ease;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .icon-btn:active {
      transform: scale(0.94);
    }

    .icon-btn[aria-pressed="true"] {
      background: var(--accent-soft);
      border-color: rgba(255, 180, 84, 0.35);
      color: var(--accent);
    }

    .icon-btn svg {
      width: 19px;
      height: 19px;
    }

    .icon-btn.loading svg {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .unit-toggle {
      flex-shrink: 0;
      display: flex;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 3px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .unit-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font: 700 13px var(--font-mono);
      padding: 8px 10px;
      border-radius: 10px;
      transition: background .2s ease, color .2s ease;
    }

    .unit-btn[aria-pressed="true"] {
      background: var(--accent);
      color: #1A1306;
    }

    .unit-btn:hover:not([aria-pressed="true"]) {
      color: var(--text-primary);
    }

    /* status / error banner */
    .status {
      margin-bottom: 18px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: rgba(255, 138, 122, 0.14);
      border: 1px solid rgba(255, 138, 122, 0.35);
      color: var(--text-primary);
      font-size: 13.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status button {
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
    }

    .status[data-kind="info"] {
      background: rgba(143, 184, 255, 0.12);
      border-color: rgba(143, 184, 255, 0.32);
    }

    .status[hidden] {
      display: none;
    }

    /* ---------------------------------------------------------------
     HERO
  --------------------------------------------------------------- */
    .hero {
      text-align: center;
      padding: 18px 10px 30px;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity .35s ease;
      animation: riseIn .7s var(--ease) .15s forwards;
    }

    .hero.updating {
      opacity: .25 !important;
    }

    .hero-date {
      margin: 0;
      font: 600 13px var(--font-mono);
      letter-spacing: .04em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .hero-place {
      margin: 6px 0 0;
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(26px, 6vw, 34px);
      letter-spacing: -0.01em;
    }

    .hero-place .sub {
      display: block;
      font-size: 14px;
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .hero-temp-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 6px;
    }

    .hero-icon {
      width: 74px;
      height: 74px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-icon svg {
      width: 100%;
      height: 100%;
    }

    .hero-temp {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(86px, 24vw, 132px);
      line-height: 1;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .hero-condition {
      margin: 4px 0 0;
      font-size: 18px;
      font-weight: 700;
      min-height: 22px;
    }

    .hero-feels {
      margin: 4px 0 0;
      font-size: 14px;
      color: var(--text-secondary);
      min-height: 17px;
    }

    /* ---------------------------------------------------------------
     STAT CHIPS
  --------------------------------------------------------------- */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 30px;
      opacity: 0;
      transform: translateY(14px);
      animation: riseIn .7s var(--ease) .30s forwards;
    }

    .chip {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 13px 12px;
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
    }

    .chip-top {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-tertiary);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }

    .chip-top svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .chip-value {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 17px;
      color: var(--text-primary);
    }

    .chip-value small {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
      display: block;
      margin-top: 2px;
    }

    .chip-sun {
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }

    .chip-sun div {
      text-align: left;
    }

    .chip-sun .lbl {
      font-size: 10px;
      color: var(--text-tertiary);
      font-family: var(--font-body);
      font-weight: 600;
    }

    /* ---------------------------------------------------------------
     FORECAST BLOCKS
  --------------------------------------------------------------- */
    .forecast-block {
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(14px);
    }

    .forecast-block--hourly {
      animation: riseIn .7s var(--ease) .42s forwards;
    }

    .forecast-block--daily {
      animation: riseIn .7s var(--ease) .54s forwards;
    }

    .block-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-secondary);
      margin: 0 0 12px 2px;
    }

    .hourly-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin: 0 -2px;
      scrollbar-width: none;
    }

    .hourly-scroll::-webkit-scrollbar {
      display: none;
    }

    .hour-card {
      flex: 0 0 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 12px 6px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .hour-card .h-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    .hour-card .h-icon {
      width: 26px;
      height: 26px;
    }

    .hour-card .h-icon svg {
      width: 100%;
      height: 100%;
    }

    .hour-card .h-temp {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 14px;
    }

    .hour-card .h-pop {
      font-size: 10px;
      color: var(--accent-cool);
      font-family: var(--font-mono);
    }

    .daily-list {
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      overflow: hidden;
    }

    .day-row {
      display: grid;
      grid-template-columns: 86px 30px 1fr 96px;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
    }

    .day-row+.day-row {
      border-top: 1px solid var(--glass-border);
    }

    .day-name {
      font-size: 14px;
      font-weight: 700;
    }

    .day-name small {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    .day-icon svg {
      width: 24px;
      height: 24px;
    }

    .day-range {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .day-range .lo {
      color: var(--text-tertiary);
      width: 30px;
      text-align: right;
    }

    .day-range .hi {
      width: 30px;
    }

    .range-track {
      position: relative;
      flex: 1;
      height: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.12);
    }

    .range-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent-cool), var(--accent));
    }

    .day-pop {
      text-align: right;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent-cool);
    }

    /* ---------------------------------------------------------------
     FOOTER
  --------------------------------------------------------------- */
    .app-footer {
      text-align: center;
      opacity: 0;
      color: var(--text-tertiary);
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: riseIn .7s var(--ease) .66s forwards;
    }

    .app-footer a {
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ---------------------------------------------------------------
     ENTRANCE ANIMATIONS
  --------------------------------------------------------------- */
    @keyframes riseIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .45;
      }
    }

    /* ---------------------------------------------------------------
     SKELETON LOADING STATE
     Shown as the real, static initial content of the hero fields and
     the stats/hourly/daily containers. Every one of these gets fully
     replaced (via textContent/innerHTML) the instant real data
     arrives, so no extra JS bookkeeping is needed to "turn it off" —
     it simply stops existing once genuine content lands.
  --------------------------------------------------------------- */
    .skel-bar,
    .skel-circle,
    .skel-dot {
      position: relative;
      display: inline-block;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.09);
      border-radius: 999px;
      vertical-align: middle;
    }

    .skel-bar::after,
    .skel-circle::after,
    .skel-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      animation: skelShimmer 1.7s ease-in-out infinite;
    }

    @keyframes skelShimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    .skel-circle {
      border-radius: 50%;
    }

    .skel-bar--place {
      display: block;
      width: 150px;
      height: 24px;
      margin: 2px auto 0;
      border-radius: 8px;
    }

    .skel-bar--region {
      display: block;
      width: 104px;
      height: 13px;
      margin: 10px auto 0;
      border-radius: 6px;
    }

    .skel-bar--temp {
      width: 170px;
      height: 76px;
      border-radius: 16px;
    }

    .skel-bar--condition {
      display: block;
      width: 130px;
      height: 16px;
      margin: 0 auto;
      border-radius: 6px;
    }

    .skel-bar--feels {
      display: block;
      width: 118px;
      height: 12px;
      margin: 0 auto;
      border-radius: 6px;
    }

    .skel-circle--hero {
      width: 58px;
      height: 58px;
    }

    .skel-bar--chip-label {
      width: 54px;
      height: 8px;
      border-radius: 4px;
    }

    .skel-bar--chip-value {
      width: 60px;
      height: 15px;
      border-radius: 5px;
    }

    .skel-bar--hlabel {
      width: 24px;
      height: 9px;
      border-radius: 4px;
    }

    .skel-circle--hicon {
      width: 22px;
      height: 22px;
    }

    .skel-bar--htemp {
      width: 22px;
      height: 12px;
      border-radius: 4px;
    }

    .skel-bar--dname {
      width: 50px;
      height: 12px;
      border-radius: 5px;
    }

    .skel-circle--dicon {
      width: 22px;
      height: 22px;
    }

    .skel-bar--drange {
      height: 4px;
      border-radius: 4px;
      width: 100%;
    }

    .skel-bar--dpop {
      width: 38px;
      height: 10px;
      border-radius: 4px;
      justify-self: end;
    }

    /* If the very first load fails, freeze the shimmer rather than let it sweep forever
     beneath an error banner — a paused, dimmed skeleton reads as "stopped", not "stuck". */
    body.skel-idle .skel-bar::after,
    body.skel-idle .skel-circle::after,
    body.skel-idle .skel-dot::after {
      animation-play-state: paused;
    }

    body.skel-idle .skel-bar,
    body.skel-idle .skel-circle,
    body.skel-idle .skel-dot {
      opacity: .4;
    }

    /* ---------------------------------------------------------------
     RESPONSIVE
  --------------------------------------------------------------- */
    @media (max-width: 480px) {
      .app {
        padding: 16px 14px 48px;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .day-row {
        grid-template-columns: 70px 26px 1fr 70px;
        gap: 8px;
        padding: 12px 12px;
      }

      .hero-temp {
        font-size: clamp(76px, 26vw, 110px);
      }
    }

    @media (max-width: 360px) {
      .unit-toggle {
        order: 3;
      }

      .topbar {
        flex-wrap: wrap;
      }
    }

    /* ---------------------------------------------------------------
     REDUCED MOTION
  --------------------------------------------------------------- */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>

  <script>
    (function () {
      "use strict";

      /* ===============================================================

      var ICON = {

        cloud: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 18h11.8a3.9 3.9 0 0 0 .4-7.8 6.1 6.1 0 0 0-11.6-2A4.5 4.5 0 0 0 5.5 18z"/></svg>',
        fog: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 9.5h7.6a2.6 2.6 0 0 0 .3-5.2A4.1 4.1 0 0 0 7.6 3 3 3 0 0 0 7.5 9.5z"/><path d="M3 13h18M3 16.3h14M3 19.6h10"/></svg>',
        drizzle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 13.5h11.8a3.9 3.9 0 0 0 .4-7.8A6.1 6.1 0 0 0 6 3.7a4.5 4.5 0 0 0-.5 9.8z"/><path d="M9 17.5l-1 2.2M14 17.5l-1 2.2"/></svg>',
        rain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 14.8h11.8a3.9 3.9 0 0 0 .4-7.8A6.1 6.1 0 0 0 6 5a4.5 4.5 0 0 0-.5 9.8z"/><path d="M7.5 18.8l-1.4 3M12.2 18.8l-1.4 3M17 18.8l-1.4 3"/></svg>',
        snow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 14.8h11.8a3.9 3.9 0 0 0 .4-7.8A6.1 6.1 0 0 0 6 5a4.5 4.5 0 0 0-.5 9.8z"/><path d="M7.5 19l-.01 3M6 20.5h3M12 19l-.01 3M10.5 20.5h3M16.5 19l-.01 3M15 20.5h3"/></svg>',
        thunder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 14.8h11.8a3.9 3.9 0 0 0 .4-7.8A6.1 6.1 0 0 0 6 5a4.5 4.5 0 0 0-.5 9.8z"/><path d="M13.3 15.6l-2.5 3.8h2l-1.1 3.2l3.9-4.8h-2l1.2-2.2z"/></svg>',
        thermo: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 11.6V4.3a1.5 1.5 0 0 0-3 0v7.3a3 3 0 1 0 3 0z"/></svg>',
        droplet: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2.5s5 6 5 9.4a5 5 0 1 1-10 0c0-3.4 5-9.4 5-9.4z"/></svg>',
        wind: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h9.2a2.3 2.3 0 1 0-1.9-3.6"/><path d="M2 11h11.7a2.4 2.4 0 1 1-2 3.8"/><path d="M2 15h6.4"/></svg>',
        horizon: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="14" x2="18" y2="14"/><path d="M5 14a5 5 0 0 1 10 0"/><line x1="10" y1="2.5" x2="10" y2="6"/></svg>',
        umbrella: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10a7 7 0 0 1 14 0z"/><path d="M10 10v6.3a1.7 1.7 0 0 1-3.2.8M10 3v1.2"/></svg>'
      };

      function svgIcon(key, cls) {
        return '<span class="' + (cls || '') + '">' + (ICON[key] || ICON.cloud) + '</span>';
      }

      /* ===============================================================
         WEATHER CODE MAPPING (WMO codes used by Open-Meteo)
      =============================================================== */
      var SCENE = {
        0: 'clear', 1: 'clear', 2: 'partly-cloudy', 3: 'cloudy',
        45: 'fog', 48: 'fog',
        51: 'drizzle', 53: 'drizzle', 55: 'drizzle', 56: 'drizzle', 57: 'drizzle',
        61: 'rain', 63: 'rain', 65: 'rain', 66: 'rain', 67: 'rain',
        71: 'snow', 73: 'snow', 75: 'snow', 77: 'snow',
        80: 'rain', 81: 'rain', 82: 'rain',
        85: 'snow', 86: 'snow',
        95: 'thunder', 96: 'thunder', 99: 'thunder'
      };
      var LABEL = {
        0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
        45: 'Fog', 48: 'Freezing fog',
        51: 'Light drizzle', 53: 'Drizzle', 55: 'Dense drizzle', 56: 'Freezing drizzle', 57: 'Freezing drizzle',
        61: 'Light rain', 63: 'Rain', 65: 'Heavy rain', 66: 'Freezing rain', 67: 'Freezing rain',
        71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 77: 'Snow grains',
        80: 'Rain showers', 81: 'Rain showers', 82: 'Heavy showers',
        85: 'Snow showers', 86: 'Snow showers',
        95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Severe thunderstorm'
      };

      function sceneOf(code) { return SCENE[code] || 'cloudy'; }
      function labelOf(code) { return LABEL[code] || 'Unsettled'; }

      function iconKeyFor(code, isDay) {
        var s = sceneOf(code);
        if (s === 'clear') return isDay ? 'sun' : 'moon';
        if (s === 'partly-cloudy') return isDay ? 'sun-cloud' : 'moon-cloud';
        return s === 'cloudy' ? 'cloud' : s;
      }

      var SKY_PALETTE = {
        'clear-1': ['#2D7DD2', '#6BB6E8', '#CFEAF7'], 'clear-0': ['#0B1330', '#16204A', '#283969'],
        'partly-cloudy-1': ['#4A90C2', '#8FB3CC', '#D9E4E9'], 'partly-cloudy-0': ['#10172E', '#202B4C', '#33415F'],
        'cloudy-1': ['#6B7785', '#94A0AB', '#C3CACF'], 'cloudy-0': ['#11151F', '#1B212C', '#2A313B'],
        'fog-1': ['#8B95A0', '#AEB6BE', '#D5DADD'], 'fog-0': ['#1A1E26', '#262B33', '#363C44'],
        'drizzle-1': ['#5D7184', '#84939F', '#B7C2C9'], 'drizzle-0': ['#101620', '#1B232E', '#2A3340'],
        'rain-1': ['#3E5066', '#5C6E80', '#8A97A2'], 'rain-0': ['#0D1420', '#19222F', '#262F3C'],
        'snow-1': ['#8FA4B8', '#BDD0DC', '#EAF1F6'], 'snow-0': ['#161E30', '#26344A', '#3B4A63'],
        'thunder-1': ['#333E4D', '#4A5666', '#6B7785'], 'thunder-0': ['#08090F', '#12141C', '#1C1F29']
      };

      /* ===============================================================
         STATE
      =============================================================== */
      var state = {
        unit: 'c',
        lastData: null,
        hasLoaded: false,
        lightningTimer: null,
        thunderTimer: null,
        suggestTimer: null,
        suggestToken: 0,
        arcTimer: null
      };

      var el = {};
      ['searchForm', 'searchInput', 'suggestions', 'locateBtn', 'soundBtn', 'unitC', 'unitF',
        'statusBanner', 'hero', 'heroDate', 'heroPlace', 'heroIcon', 'heroTemp', 'heroCondition', 'heroFeels',
        'statsGrid', 'hourlyScroll', 'dailyList', 'lastUpdated',
        'skyLayer', 'skyGradient', 'horizonGlow', 'stars', 'celestialBody', 'cloudsLayer', 'rainLayer', 'snowLayer', 'fogLayer', 'lightningFlash', 'lightningBolt',
        'soundOnIcon', 'soundOffIcon'
      ].forEach(function (id) { el[id] = document.getElementById(id); });

      /* ===============================================================
         UTILITIES
      =============================================================== */
      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

      function timePart(iso) { // "2026-06-27T15:00" -> {h:15,m:0}
        var t = iso.split('T')[1] || '00:00';
        var hm = t.split(':');
        return { h: parseInt(hm[0], 10), m: parseInt(hm[1], 10) };
      }
      function minutesOfDay(iso) { var p = timePart(iso); return p.h * 60 + p.m; }
      function fmtHour12(h, m) {
        var ampm = h >= 12 ? 'PM' : 'AM';
        var hh = h % 12; if (hh === 0) hh = 12;
        return hh + (m ? ':' + String(m).padStart(2, '0') : '') + ' ' + ampm;
      }
      function fmtHHMM(iso) { var p = timePart(iso); return String(p.h).padStart(2, '0') + ':' + String(p.m).padStart(2, '0'); }

      function cToF(c) { return c * 9 / 5 + 32; }
      function fmtTemp(c, withUnit) {
        if (c === null || c === undefined || isNaN(c)) return '--' + (withUnit ? '°' : '');
        var v = state.unit === 'f' ? cToF(c) : c;
        return Math.round(v) + (withUnit ? '°' : '');
      }
      function compass(deg) {
        var dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
        return dirs[Math.round(deg / 22.5) % 16];
      }
      function uvCategory(uv) {
        if (uv == null) return '';
        if (uv < 3) return 'Low';
        if (uv < 6) return 'Moderate';
        if (uv < 8) return 'High';
        if (uv < 11) return 'Very high';
        return 'Extreme';
      }
      function setStatus(msg, kind, opts) {
        opts = opts || {};
        if (!msg) { el.statusBanner.hidden = true; el.statusBanner.innerHTML = ''; return; }
        el.statusBanner.hidden = false;
        el.statusBanner.dataset.kind = kind || 'error';
        el.statusBanner.innerHTML = '<span>' + msg + '</span>' +
          (opts.retry ? '<button type="button" id="retryBtn">Retry</button>' : '');
        if (opts.retry) {
          document.getElementById('retryBtn').addEventListener('click', opts.retry);
        }
      }

      /* ===============================================================
         SKY ENGINE
      =============================================================== */
      function setSkyPalette(scene, isDay) {
        var key = scene + '-' + (isDay ? 1 : 0);
        var p = SKY_PALETTE[key] || SKY_PALETTE['cloudy-1'];
        document.documentElement.style.setProperty('--sky-top', p[0]);
        document.documentElement.style.setProperty('--sky-mid', p[1]);
        document.documentElement.style.setProperty('--sky-bottom', p[2]);
      }

      function setHorizonGlow(opacity) {
        el.horizonGlow.style.opacity = clamp(opacity, 0, 0.65);
      }

      var starsBuilt = false;
      function buildStars() {
        if (starsBuilt) return;
        starsBuilt = true;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 140; i++) {
          var s = document.createElement('span');
          var x = Math.random() * 100, y = Math.random() * 62;
          var size = Math.random() < 0.82 ? 1 : 2;
          s.style.left = x + 'vw';
          s.style.top = y + 'vh';
          s.style.width = size + 'px';
          s.style.height = size + 'px';
          s.style.background = 'rgba(255,255,255,' + (Math.random() * 0.5 + 0.5).toFixed(2) + ')';
          s.style.borderRadius = '50%';
          s.style.animation = 'pulse ' + (2.5 + Math.random() * 3).toFixed(1) + 's ease-in-out infinite';
          s.style.animationDelay = (Math.random() * 3).toFixed(1) + 's';
          frag.appendChild(s);
        }
        el.stars.appendChild(frag);
      }
      function setStarsActive(active) {
        buildStars();
        el.stars.style.opacity = active ? 1 : 0;
      }

      function clearClouds() {
        el.cloudsLayer.innerHTML = '';
      }
      function buildClouds(scene, isDay) {
        clearClouds();
        var density = { clear: 0, 'partly-cloudy': 3, cloudy: 6, fog: 0, drizzle: 5, rain: 6, snow: 5, thunder: 7 };
        var count = density[scene] != null ? density[scene] : 4;
        var tone = 'cloud--light';
        if (!isDay) tone = 'cloud--night';
        else if (scene === 'cloudy' || scene === 'fog') tone = 'cloud--grey';
        else if (scene === 'rain' || scene === 'thunder' || scene === 'drizzle') tone = 'cloud--dark';
        else if (scene === 'snow') tone = 'cloud--grey';

      }
      function pointsToPath(pts) {
        return 'M' + pts.map(function (p) { return p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join('L');
      }

      // Builds one lightning strike's SVG: a jagged main channel plus 0-2 fainter forks, sized
      // and positioned in real viewport pixels (not a stretched viewBox) so the stroke width and
      // zigzag angles stay geometrically correct on any screen shape. Distance (0=overhead,
      // 1=far off) drives how much of the sky the bolt spans, how thick it is, and how often it
      // forks -- the same "closeness" that already shapes the flash brightness and thunder delay,
      // so every strike reads as one coherent event instead of independently-random effects.
      function buildLightningBolt(distance) {
        el.lightningBolt.innerHTML = '';
        // The very farthest strikes are drawn as glow-only (flash but no visible channel) --
        // real storms look like this when the stroke is beyond the horizon or hidden in cloud.
        if (distance > 0.82) return;

        var W = window.innerWidth, H = window.innerHeight;
        var closeness = 1 - distance;
        var originX = rand(W * 0.18, W * 0.82);
        var originY = rand(0, H * 0.04);
        var endX = originX + rand(-W * 0.06, W * 0.06);
        var endY = originY + H * (0.26 + closeness * 0.32);

        var pts = jaggedPath(originX, originY, endX, endY, W * (0.045 + closeness * 0.03), 4);
        var coreWidth = 2 + closeness * 2.6;

        var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '">';
        var branchCount = closeness > 0.55 ? (Math.random() < 0.7 ? 1 : 2) : (Math.random() < 0.3 ? 1 : 0);
        for (var b = 0; b < branchCount; b++) {
          var idx = Math.max(1, Math.floor(pts.length * rand(0.25, 0.6)));
          var bx = pts[idx][0], by = pts[idx][1];
          var dir = Math.random() < 0.5 ? -1 : 1;
          var bEndX = bx + dir * rand(W * 0.05, W * 0.13);
          var bEndY = by + rand(H * 0.08, H * 0.18);
          var bpts = jaggedPath(bx, by, bEndX, bEndY, W * 0.028, 3);
          svg += '<path class="bolt-branch" d="' + pointsToPath(bpts) + '" stroke-width="' + (coreWidth * 0.42).toFixed(2) + '"/>';
        }
        svg += '<path class="bolt-core" d="' + pointsToPath(pts) + '" stroke-width="' + coreWidth.toFixed(2) + '"/>';
        svg += '</svg>';
        el.lightningBolt.innerHTML = svg;
      }

      function stopLightning() {
        if (state.lightningTimer) { clearTimeout(state.lightningTimer); state.lightningTimer = null; }
        if (state.thunderTimer) { clearTimeout(state.thunderTimer); state.thunderTimer = null; }
        el.lightningFlash.classList.remove('flash');
        el.lightningBolt.classList.remove('flash');
        el.lightningBolt.innerHTML = '';
      }
      function scheduleLightning() {
        stopLightning();
        function tick() {
          // One "distance" roll drives the whole event so the flash, the visible bolt, and its
          // thunder all feel like a single coherent strike rather than independently-random
          // effects: a close strike flashes bright, draws a big bold channel low into the sky,
          // and cracks almost instantly; a far one only glows softly and rumbles in late.
          var distance = Math.random();
          var delay = 220 + distance * 2700;
          var flashPeak = (0.92 - distance * 0.5).toFixed(2);
          var flashDur = (0.42 + distance * 0.45).toFixed(2) + 's';

          el.lightningFlash.classList.remove('flash');
          el.lightningBolt.classList.remove('flash');
          // Set on the shared skyLayer parent (not the flash element itself) so both the flash
          // and the bolt -- siblings -- inherit the same --flash-peak/--flash-dur and stay
          // perfectly in sync without duplicating the values on each element.
          el.skyLayer.style.setProperty('--flash-peak', flashPeak);
          el.skyLayer.style.setProperty('--flash-dur', flashDur);
          buildLightningBolt(distance);
          requestAnimationFrame(function () {
            el.lightningFlash.classList.add('flash');
            el.lightningBolt.classList.add('flash');
            state.thunderTimer = setTimeout(function () {
              state.thunderTimer = null;
              SoundFX.playThunder(distance);
            }, delay);
          });
          state.lightningTimer = setTimeout(tick, 3500 + Math.random() * 5500);
        }
        state.lightningTimer = setTimeout(tick, 1500 + Math.random() * 3000);
      }


      // Sun/moon arc position based on minutes-of-day vs sunrise/sunset.
      function updateCelestial(data) {
        if (!data) return;
        var nowMin = minutesOfDay(data._localISO);
        var sunrise = minutesOfDay(data.daily.sunrise[0]);
        var sunset = minutesOfDay(data.daily.sunset[0]);
        var isDay = !!data.current.is_day;
        var t, body;

        if (isDay) {
          t = clamp((nowMin - sunrise) / Math.max(1, (sunset - sunrise)), 0, 1);
          body = 'sun';
        } else {
          var nextSunrise = data.daily.sunrise[1] ? minutesOfDay(data.daily.sunrise[1]) + 1440 : sunrise + 1440;
          var base = nowMin < sunrise ? nowMin + 1440 : nowMin; // handle past-midnight
          var span = Math.max(1, nextSunrise - sunset);
          t = clamp((base - sunset) / span, 0, 1);
          body = 'moon';
        }
        var x = 8 + t * 84; // vw
        var y = 56 - Math.sin(t * Math.PI) * 44; // vh, arcs up then down, kept clear of the stat cards
        el.celestialBody.className = body;
        el.celestialBody.style.left = x + 'vw';
        el.celestialBody.style.top = y + 'vh';
        el.celestialBody.style.opacity = 1;

        // horizon glow strongest within ~40 min of sunrise/sunset
        var distToRise = Math.abs(nowMin - sunrise);
        var distToSet = Math.abs(nowMin - sunset);
        var dist = Math.min(distToRise, distToSet, 1440);
        var glow = clamp(1 - dist / 45, 0, 1) * 0.6;
        setHorizonGlow(glow);

        setStarsActive(!isDay && (sceneOf(data.current.weather_code) === 'clear' || sceneOf(data.current.weather_code) === 'partly-cloudy'));
      }

      var lastSceneKey = null;
      function applySky(data) {
        var scene = sceneOf(data.current.weather_code);
        var isDay = !!data.current.is_day;
        setSkyPalette(scene, isDay);
        var sceneKey = scene + '|' + (isDay ? 1 : 0);
        if (sceneKey !== lastSceneKey) {
          lastSceneKey = sceneKey;
          buildClouds(scene, isDay);
          setPrecip(scene);
          if (scene === 'thunder') scheduleLightning(); else stopLightning();
        }
        updateCelestial(data);
      }

      /* ===============================================================
         RENDERING
      =============================================================== */
      function statChip(iconKey, label, valueHTML) {
        return '<div class="chip">' +
          '<div class="chip-top">' + svgIcon(iconKey) + '<span>' + label + '</span></div>' +
          '<div class="chip-value">' + valueHTML + '</div>' +
          '</div>';
      }

      function renderHero(data) {
        var c = data.current;
        var isDay = !!c.is_day;
        var key = iconKeyFor(c.weather_code, isDay);
        el.heroIcon.innerHTML = ICON[key] || ICON.cloud;
        el.heroTemp.textContent = fmtTemp(c.temperature_2m, true);
        el.heroCondition.textContent = labelOf(c.weather_code);
        el.heroFeels.textContent = 'Feels like ' + fmtTemp(c.apparent_temperature, true);

        var dt = new Date(Date.now() + data.utc_offset_seconds * 1000);
        var weekday = dt.toLocaleDateString('en-US', { weekday: 'long', timeZone: 'UTC' });
        var hh = dt.getUTCHours(), mm = dt.getUTCMinutes();
        el.heroDate.textContent = weekday + ' · ' + fmtHour12(hh, mm);

        var place = data._place.name;
        var region = [data._place.admin1, data._place.country].filter(Boolean).join(', ');
        el.heroPlace.innerHTML = place + (region ? '<span class="sub">' + region + '</span>' : '');
      }

      function renderStats(data) {
        var c = data.current, d = data.daily;
        var rainChance = d.precipitation_probability_max ? d.precipitation_probability_max[0] : null;
        var uv = d.uv_index_max ? Math.round(d.uv_index_max[0]) : null;

        var html = '';
        html += statChip('thermo', 'Feels like', fmtTemp(c.apparent_temperature, true));
        html += statChip('droplet', 'Humidity', (c.relative_humidity_2m != null ? Math.round(c.relative_humidity_2m) + '%' : '--'));
        html += statChip('wind', 'Wind', (c.wind_speed_10m != null ? Math.round(c.wind_speed_10m) + ' km/h' : '--') +
          (c.wind_direction_10m != null ? '<small>' + compass(c.wind_direction_10m) + '</small>' : ''));
        html += statChip('sun', 'UV index', (uv != null ? uv : '--') + (uv != null ? '<small>' + uvCategory(uv) + '</small>' : ''));
        html += statChip('umbrella', 'Chance of rain', (rainChance != null ? rainChance + '%' : '--'));
        html += '<div class="chip"><div class="chip-top">' + svgIcon('horizon') + '<span>Sun</span></div>' +
          '<div class="chip-value chip-sun">' +
          '<div><span class="lbl">Rise</span><br>' + fmtHHMM(d.sunrise[0]) + '</div>' +
          '<div><span class="lbl">Set</span><br>' + fmtHHMM(d.sunset[0]) + '</div>' +
          '</div></div>';
        el.statsGrid.innerHTML = html;
      }

      function renderHourly(data) {
        var h = data.hourly;
        var nowISO = data.current.time;
        var idx = h.time.indexOf(nowISO);
        if (idx === -1) { idx = h.time.findIndex(function (t) { return t >= nowISO; }); }
        if (idx === -1) idx = 0;

        var html = '';
        for (var i = idx; i < Math.min(idx + 24, h.time.length); i++) {
          var isNow = i === idx;
          var p = timePart(h.time[i]);
          var label = isNow ? 'Now' : fmtHour12(p.h, 0);
          var isDayHr = (p.h >= 6 && p.h < 19) ? 1 : 0;
          var key = iconKeyFor(h.weather_code[i], isDayHr);
          var pop = h.precipitation_probability ? h.precipitation_probability[i] : null;
          html += '<div class="hour-card">' +
            '<span class="h-label">' + label + '</span>' +
            '<span class="h-icon">' + (ICON[key] || ICON.cloud) + '</span>' +
            '<span class="h-temp">' + fmtTemp(h.temperature_2m[i], true) + '</span>' +
            (pop != null && pop > 0 ? '<span class="h-pop">' + pop + '%</span>' : '<span class="h-pop">&nbsp;</span>') +
            '</div>';
        }
        el.hourlyScroll.innerHTML = html;
      }

      function renderDaily(data) {
        var d = data.daily;
        var todayStr = data.current.time.slice(0, 10);
        var mins = d.temperature_2m_min.slice(0, 7);
        var maxs = d.temperature_2m_max.slice(0, 7);
        var weekMin = Math.min.apply(null, mins);
        var weekMax = Math.max.apply(null, maxs);
        var span = Math.max(1, weekMax - weekMin);

        var html = '';
        for (var i = 0; i < Math.min(7, d.time.length); i++) {
          var parts = d.time[i].split('-');
          var dateObj = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
          var label;
          if (d.time[i] === todayStr) { label = 'Today'; }
          else {
            var tmrw = new Date(parseInt(todayStr.slice(0, 4), 10), parseInt(todayStr.slice(5, 7), 10) - 1, parseInt(todayStr.slice(8, 10), 10) + 1);
            label = (dateObj.getTime() === tmrw.getTime()) ? 'Tomorrow' : dateObj.toLocaleDateString('en-US', { weekday: 'short' });
          }
          var monthDay = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          var key = iconKeyFor(d.weather_code[i], 1);
          var lo = mins[i], hi = maxs[i];
          var leftPct = ((lo - weekMin) / span) * 100;
          var widthPct = Math.max(8, ((hi - lo) / span) * 100);
          var pop = d.precipitation_probability_max ? d.precipitation_probability_max[i] : null;

          html += '<div class="day-row">' +
            '<div class="day-name">' + label + '<small>' + monthDay + '</small></div>' +
            '<div class="day-icon">' + (ICON[key] || ICON.cloud) + '</div>' +
            '<div class="day-range">' +
            '<span class="lo">' + fmtTemp(lo, true) + '</span>' +
            '<span class="range-track"><span class="range-fill" style="left:' + leftPct.toFixed(1) + '%;width:' + widthPct.toFixed(1) + '%"></span></span>' +
            '<span class="hi">' + fmtTemp(hi, true) + '</span>' +
            '</div>' +
            '<div class="day-pop">' + (pop != null ? pop + '% rain' : '&nbsp;') + '</div>' +
            '</div>';
        }
        el.dailyList.innerHTML = html;
      }

      function renderAll(data) {
        state.lastData = data;
        renderHero(data);
        renderStats(data);
        renderHourly(data);
        renderDaily(data);
        applySky(data);

        var stamp = new Date(Date.now() + data.utc_offset_seconds * 1000);
        el.lastUpdated.textContent = 'Updated ' + fmtHour12(stamp.getUTCHours(), stamp.getUTCMinutes()) + ' local time';

        if (!state.hasLoaded) {
          state.hasLoaded = true;
          document.body.classList.add('loaded');
        }
        if (state.arcTimer) clearInterval(state.arcTimer);
        state.arcTimer = setInterval(function () {
          data._localISO = isoNowFor(data.utc_offset_seconds);
          updateCelestial(data);
        }, 60000);
      }

      function isoNowFor(offsetSeconds) {
        var d = new Date(Date.now() + offsetSeconds * 1000);
        var pad = function (n) { return String(n).padStart(2, '0'); };
        return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate()) +
          'T' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
      }

      /* ===============================================================
         DATA FETCHING
      =============================================================== */
      var GEOCODE_URL = 'https://geocoding-api.open-meteo.com/v1/search';
      var FORECAST_URL = 'https://api.open-meteo.com/v1/forecast';
      var REVERSE_URL = 'https://api.bigdatacloud.net/data/reverse-geocode-client';

      function setSkeletonIdle(isIdle) {
        document.body.classList.toggle('skel-idle', !!isIdle);
      }

      function showLoading(message) {
        setSkeletonIdle(false);
        if (!state.hasLoaded) {
          // First-ever load: the skeleton is already visible, just keep its status label current.
          if (message) el.heroDate.textContent = message;
        } else {
          // A later re-fetch (search, retry, relocate): dim the real content already on screen
          // and show a brief status in its place rather than reverting to a full skeleton.
          el.hero.classList.add('updating');
          el.heroCondition.textContent = message || 'Fetching weather…';
        }
      }

      function fetchForecast(lat, lon, place) {
        showLoading('Loading the forecast' + (place && place.name ? ' for ' + place.name : '') + '…');
        var url = FORECAST_URL + '?latitude=' + lat + '&longitude=' + lon +
          '&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl' +
          '&hourly=temperature_2m,weather_code,precipitation_probability' +
          '&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,precipitation_probability_max' +
          '&timezone=auto&forecast_days=7';

        return fetch(url).then(function (res) {
          if (!res.ok) throw new Error('forecast_failed');
          return res.json();
        }).then(function (json) {
          if (!json.current || !json.daily || !json.hourly) { throw new Error('bad_payload'); }
          json.current.weather_code = json.current.weather_code != null ? json.current.weather_code : json.current.weathercode;
          json.hourly.weather_code = json.hourly.weather_code || json.hourly.weathercode;
          json.daily.weather_code = json.daily.weather_code || json.daily.weathercode;
          json._place = place;
          json._localISO = isoNowFor(json.utc_offset_seconds);
          setStatus(null);
          el.hero.classList.remove('updating');
          renderAll(json);
        }).catch(function (err) {
          el.hero.classList.remove('updating');
          if (!state.hasLoaded) {
            el.heroDate.textContent = 'Unable to load weather';
            setSkeletonIdle(true);
          }
          setStatus("Couldn't load weather right now. Check your connection and try again.", 'error', { retry: function () { fetchForecast(lat, lon, place); } });
        });
      }

      function geocodeAndFetch(query) {
        showLoading('Searching for ' + query + '…');
        var url = GEOCODE_URL + '?name=' + encodeURIComponent(query) + '&count=1&language=en&format=json';
        return fetch(url).then(function (res) { return res.json(); }).then(function (json) {
          if (!json.results || !json.results.length) {
            el.hero.classList.remove('updating');
            if (!state.hasLoaded) {
              el.heroDate.textContent = 'No matching city found';
              setSkeletonIdle(true);
            }
            setStatus('No matching city. Check the spelling or try a nearby larger town.', 'error');
            return;
          }
          var r = json.results[0];
          fetchForecast(r.latitude, r.longitude, { name: r.name, admin1: r.admin1, country: r.country });
        }).catch(function () {
          el.hero.classList.remove('updating');
          if (!state.hasLoaded) {
            el.heroDate.textContent = 'Unable to search right now';
            setSkeletonIdle(true);
          }
          setStatus("Couldn't search for that city. Check your connection and try again.", 'error', { retry: function () { geocodeAndFetch(query); } });
        });
      }

      function fetchSuggestions(query) {
        var url = GEOCODE_URL + '?name=' + encodeURIComponent(query) + '&count=5&language=en&format=json';
        return fetch(url).then(function (res) { return res.json(); }).then(function (json) {
          return json.results || [];
        }).catch(function () { return []; });
      }

      function locateMe() {
        if (!navigator.geolocation) {
          setStatus('Location access is not available in this browser.', 'info');
          return;
        }
        el.locateBtn.classList.add('loading');
        navigator.geolocation.getCurrentPosition(function (pos) {
          el.locateBtn.classList.remove('loading');
          var lat = pos.coords.latitude, lon = pos.coords.longitude;
          fetch(REVERSE_URL + '?latitude=' + lat + '&longitude=' + lon + '&localityLanguage=en')
            .then(function (res) { return res.json(); })
            .then(function (json) {
              var name = json.city || json.locality || 'Your location';
              fetchForecast(lat, lon, { name: name, admin1: json.principalSubdivision, country: json.countryName });
            })
            .catch(function () {
              fetchForecast(lat, lon, { name: 'Your location', admin1: '', country: '' });
            });
        }, function () {
          el.locateBtn.classList.remove('loading');
          setStatus('Location access was denied. Search for a city instead.', 'info');
        }, { enableHighAccuracy: false, timeout: 8000 });
      }

      /* ===============================================================
         EVENTS
      =============================================================== */
      el.searchForm.addEventListener('submit', function (e) {
        e.preventDefault();
        var q = el.searchInput.value.trim();
        if (!q) return;
        hideSuggestions();
        geocodeAndFetch(q);
      });

      function hideSuggestions() {
        state.suggestToken++;
        if (state.suggestTimer) { clearTimeout(state.suggestTimer); state.suggestTimer = null; }
        el.suggestions.hidden = true;
        el.suggestions.innerHTML = '';
      }

      el.searchInput.addEventListener('input', function () {
        if (state.suggestTimer) { clearTimeout(state.suggestTimer); state.suggestTimer = null; }
        var q = el.searchInput.value.trim();
        if (q.length < 2) { hideSuggestions(); return; }
        var myToken = ++state.suggestToken;
        state.suggestTimer = setTimeout(function () {
          fetchSuggestions(q).then(function (results) {
            if (myToken !== state.suggestToken) return; // a search was submitted/dismissed since this fetch began
            if (!results.length) {
              el.suggestions.innerHTML = '<div class="s-empty">No matches yet — keep typing.</div>';
              el.suggestions.hidden = false;
              return;
            }
            el.suggestions.innerHTML = results.map(function (r, i) {
              var meta = [r.admin1, r.country].filter(Boolean).join(', ');
              return '<button type="button" data-i="' + i + '"><span class="s-name">' + r.name + '</span><span class="s-meta">' + meta + '</span></button>';
            }).join('');
            el.suggestions.hidden = false;
            Array.prototype.forEach.call(el.suggestions.querySelectorAll('button'), function (btn) {
              btn.addEventListener('click', function () {
                var r = results[parseInt(btn.dataset.i, 10)];
                el.searchInput.value = r.name;
                hideSuggestions();
                fetchForecast(r.latitude, r.longitude, { name: r.name, admin1: r.admin1, country: r.country });
              });
            });
          });
        }, 320);
      });

      document.addEventListener('click', function (e) {
        if (!el.searchForm.contains(e.target)) hideSuggestions();
      });

      el.locateBtn.addEventListener('click', locateMe);

      // hide sound button if Web Audio API not available
      function updateSoundIcon(on) {
        el.soundOnIcon.style.display = on ? '' : 'none';
        el.soundOffIcon.style.display = on ? 'none' : '';
      }
      if (!SoundFX.supported()) {
        el.soundBtn.style.display = 'none';
      } else {
        updateSoundIcon(false); // sound starts off — match the icon to that from the very first paint
      }
      el.soundBtn.addEventListener('click', function () {
        var on = el.soundBtn.getAttribute('aria-pressed') !== 'true';
        var ok = SoundFX.setEnabled(on, state.lastData);
        if (!ok) { el.soundBtn.style.display = 'none'; return; }
        el.soundBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
        updateSoundIcon(on);
      });

      function setUnit(u) {
        if (state.unit === u) return;
        state.unit = u;
        el.unitC.setAttribute('aria-pressed', u === 'c' ? 'true' : 'false');
        el.unitF.setAttribute('aria-pressed', u === 'f' ? 'true' : 'false');
        if (state.lastData) renderAll(state.lastData);
      }
      el.unitC.addEventListener('click', function () { setUnit('c'); });
      el.unitF.addEventListener('click', function () { setUnit('f'); });

      /* ===============================================================
         INIT
      =============================================================== */
      function init() {
        if (navigator.geolocation) {
          var settled = false;
          var timer = setTimeout(function () {
            if (!settled) { settled = true; geocodeAndFetch('Surat'); }
          }, 4500);
          navigator.geolocation.getCurrentPosition(function (pos) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            var lat = pos.coords.latitude, lon = pos.coords.longitude;
            fetch(REVERSE_URL + '?latitude=' + lat + '&longitude=' + lon + '&localityLanguage=en')
              .then(function (res) { return res.json(); })
              .then(function (json) {
                var name = json.city || json.locality || 'Your location';
                fetchForecast(lat, lon, { name: name, admin1: json.principalSubdivision, country: json.countryName });
              })
              .catch(function () {
                fetchForecast(lat, lon, { name: 'Your location', admin1: '', country: '' });
              });
          }, function () {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            geocodeAndFetch('Surat');
          }, { enableHighAccuracy: false, timeout: 4000 });
        } else {
          geocodeAndFetch('Surat');
        }
      }

      init();
    })();
  </script>
</body>

</html>
